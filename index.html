<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>金海嘉运订货系统 HR2.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,sans-serif;background:#f0f2f5;display:flex;justify-content:center;padding:16px;min-height:100vh}
        .container{max-width:800px;width:100%}
        .card{background:white;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
        h2{margin-bottom:16px}
        label{display:block;margin-bottom:6px;font-weight:500}
        input,select{width:100%;padding:10px;border:1px solid #d9d9d9;border-radius:8px;font-size:14px;margin-bottom:14px}
        button{background:#1677ff;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px}
        button:hover{background:#4096ff}
        .btn-danger{background:#ff4d4f}.btn-danger:hover{background:#ff7875}
        .btn-success{background:#52c41a}.btn-success:hover{background:#73d13d}
        .btn-warning{background:#fa8c16}
        .login-box{max-width:400px;margin:40px auto}
        .error{color:#ff4d4f;margin-top:8px}
        table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
        th,td{border:1px solid #e8e8e8;padding:6px 10px;text-align:left}
        th{background:#fafafa}
        .row-flex{display:flex;gap:12px;flex-wrap:wrap}
        .row-flex>*{flex:1;min-width:120px}
        .hidden{display:none}
        .brand{font-size:20px;font-weight:bold;color:#1677ff}
        .msg{color:#1677ff;margin-top:8px;font-size:14px}
    </style>
</head>
<body>
    <div id="loginPage" class="card login-box">
        <h2>金海嘉运订货系统 HR2.0</h2>
        <input id="loginUsername" placeholder="用户名" autofocus>
        <input id="loginPassword" type="password" placeholder="密码">
        <button id="loginBtn" style="width:100%">进入系统</button>
        <div id="loginError" class="error"></div>
    </div>

    <!-- 销售商界面 -->
    <div id="salesPage" style="display:none" class="container">
        <div class="card">
            <span class="brand">🚚 金海嘉运 HR2.0</span>
            <span id="salesWelcome" style="font-weight:bold"></span>
            <span style="float:right"><button id="salesLogoutBtn" class="btn-danger">退出</button></span>
        </div>
        <div class="card">
            <h2>📤 上传订单文件</h2>
            <p style="font-size:13px;color:#666">请上传标准32列Excel文件。系统自动计算费用并扣减余额。</p>
            <input type="file" id="orderFile" accept=".xlsx, .xls">
            <button id="uploadOrderBtn">📤 上传并提交</button>
            <div id="uploadMsg" class="msg"></div>
            <hr style="margin:16px 0">
            <button id="downloadTemplateBtn" class="btn-success">📋 下载标准模板</button>
        </div>
        <div class="card">
            <h2>📥 下载我的表格</h2>
            <p style="font-size:13px;color:#666">下载管理员拆分给您的订单文件（含余额、费用明细）。</p>
            <button id="downloadMyFileBtn" class="btn-success">⬇️ 下载我的表格</button>
            <div id="downloadMsg" class="msg"></div>
        </div>
    </div>

    <!-- 管理员界面 -->
    <div id="adminPage" style="display:none" class="container">
        <div class="card">
            <span class="brand">🚚 金海嘉运 HR2.0</span>
            <span id="adminWelcome" style="font-weight:bold"></span>
            <span style="float:right"><button id="adminLogoutBtn" class="btn-danger">退出</button></span>
        </div>
        <div class="card">
            <h2>👥 销售商管理</h2>
            <div class="row-flex"><div><label>用户名</label><input id="newUsername"></div><div><label>密码</label><input id="newPassword"></div><div><label>初始余额</label><input id="newBalance" type="number" value="0"></div></div>
            <button id="addUserBtn">➕ 添加销售商</button>
            <table id="userTable" style="margin-top:12px"><thead><tr><th>用户名</th><th>密码</th><th>余额</th><th>操作</th></tr></thead><tbody></tbody></table>
        </div>
        <div class="card">
            <h2>🛒 商品SKU管理</h2>
            <div class="row-flex"><div><label>SKU</label><input id="newSku"></div><div><label>单价</label><input id="newPrice" type="number" step="0.01"></div></div>
            <button id="addProductBtn">➕ 添加</button>
            <table id="productTable" style="margin-top:12px"><thead><tr><th>SKU</th><th>单价</th><th>操作</th></tr></thead><tbody></tbody></table>
        </div>
        <div class="card">
            <h2>⚙️ 运费设置</h2>
            <div class="row-flex">
                <div><label>阈值</label><input id="shipThreshold" type="number" value="4"></div>
                <div><label>低价运费</label><input id="shipLow" type="number" value="18"></div>
                <div><label>高价运费</label><input id="shipHigh" type="number" value="35"></div>
            </div>
            <button id="saveShippingBtn">💾 保存</button>
        </div>
        <div class="card">
            <h2>📤 上传总表（自动拆分）</h2>
            <p style="font-size:13px;color:#666">上传包含多个Sheet的Excel工作簿，Sheet名需与销售商用户名一致。</p>
            <input type="file" id="masterFile" accept=".xlsx, .xls">
            <button id="uploadMasterBtn">📤 上传并拆分</button>
            <div id="masterMsg" class="msg"></div>
        </div>
        <div class="card">
            <h2>📥 下载各销售商订单</h2>
            <div class="row-flex">
                <div><label>开始日期</label><input type="date" id="adminStartDate"></div>
                <div><label>结束日期</label><input type="date" id="adminEndDate"></div>
            </div>
            <button id="downloadAllOrdersBtn" class="btn-success">⬇️ 下载全部订单（分Sheet）</button>
        </div>
        <div class="card">
            <h2>📊 生成月度汇总表</h2>
            <label>选择月份</label>
            <input type="month" id="summaryMonth">
            <button id="generateSummaryBtn" class="btn-success">📊 生成月度汇总</button>
            <div id="summaryMsg" class="msg"></div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBurKJOCabtCMQol9OONrk_piEQ-qk07DA",
        authDomain: "jhjy-dhxt.firebaseapp.com",
        projectId: "jhjy-dhxt",
        storageBucket: "jhjy-dhxt.firebasestorage.app",
        messagingSenderId: "956044233586",
        appId: "1:956044233586:web:c042c583dc7fd92c99abeb"
    };
    const ADMIN_USER = "admin", ADMIN_PASS = "admin123";
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    let currentUser = null, allProducts = [], shippingRule = { threshold: 4, low: 18, high: 35 };
    const TEMPLATE_HEADERS = ['填表日期','来源','物流单号','收件人姓名','收件人地址','收件邮编','收件电话','发货箱数','目的地','订单号','店铺名称','品名','描述(材质）','商品数量','商品1SKU','产品1数量','商品2SKU','产品2数量','商品3SKU','产品3数量','商品4SKU','产品4数量','商品5SKU','产品5数量','商品费用','运费','总费用','申请时余额','扣减后余额','余额变动','备注','是否已导出'];

    async function ensureAuth() { if (auth.currentUser) return auth.currentUser; return auth.signInAnonymously(); }

    // ==================== 登录 ====================
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const u = document.getElementById('loginUsername').value.trim(), p = document.getElementById('loginPassword').value.trim();
        if(!u||!p) { document.getElementById('loginError').textContent='请输入用户名和密码'; return; }
        try {
            await ensureAuth();
            const q = await db.collection('users').where('username','==',u).where('password','==',p).get();
            if(q.empty) throw new Error('用户名或密码错误');
            const d = q.docs[0].data();
            currentUser = { id: q.docs[0].id, username: d.username, role: d.role, balance: d.balance||0 };
            document.getElementById('loginPage').style.display = 'none';
            if(currentUser.role === 'admin') showAdminPage();
            else showSalesPage();
        } catch(e) { document.getElementById('loginError').textContent = e.message; }
    });

    function showAdminPage() {
        document.getElementById('adminPage').style.display = 'block';
        document.getElementById('adminWelcome').textContent = `欢迎，${currentUser.username}（管理员）`;
        loadProducts(); loadShippingRule();
        renderUserList(); renderProductList(); loadShippingSettings();
    }

    function showSalesPage() {
        document.getElementById('salesPage').style.display = 'block';
        document.getElementById('salesWelcome').textContent = `欢迎，${currentUser.username}`;
        loadProducts(); loadShippingRule();
    }

    // 退出
    document.getElementById('salesLogoutBtn').addEventListener('click', logout);
    document.getElementById('adminLogoutBtn').addEventListener('click', logout);
    function logout() {
        auth.signOut();
        currentUser = null;
        document.getElementById('salesPage').style.display = 'none';
        document.getElementById('adminPage').style.display = 'none';
        document.getElementById('loginPage').style.display = 'block';
    }

    // ==================== 商品管理 ====================
    async function loadProducts() { await ensureAuth(); const s = await db.collection('products').get(); allProducts = s.docs.map(d=>({id:d.id,...d.data()})); }
    document.getElementById('addProductBtn').addEventListener('click', async ()=>{
        const sku = document.getElementById('newSku').value.trim(), price = parseFloat(document.getElementById('newPrice').value);
        if(!sku||isNaN(price)){alert('请填写');return;}
        await db.collection('products').add({sku,price}); loadProducts(); renderProductList();
    });
    async function renderProductList() {
        const tbody = document.querySelector('#productTable tbody'); tbody.innerHTML='';
        const s = await db.collection('products').get();
        s.forEach(d=>{ const p=d.data(); tbody.innerHTML+=`<tr><td>${p.sku}</td><td>${p.price}</td><td><button class="btn-danger" onclick="db.collection('products').doc('${d.id}').delete().then(()=>renderProductList())">删除</button></td></tr>`; });
    }

    // ==================== 运费 ====================
    async function loadShippingRule() { const d = await db.collection('settings').doc('shipping').get(); if(d.exists) shippingRule = d.data(); }
    async function loadShippingSettings() { const d = await db.collection('settings').doc('shipping').get(); if(d.exists){ document.getElementById('shipThreshold').value=d.data().threshold; document.getElementById('shipLow').value=d.data().low; document.getElementById('shipHigh').value=d.data().high; } }
    document.getElementById('saveShippingBtn').addEventListener('click', async ()=>{
        const t=parseInt(document.getElementById('shipThreshold').value),l=parseFloat(document.getElementById('shipLow').value),h=parseFloat(document.getElementById('shipHigh').value);
        await db.collection('settings').doc('shipping').set({threshold:t,low:l,high:h}); shippingRule={threshold:t,low:l,high:h}; alert('已保存');
    });
    function calcShipping(q) { if(q<=0) return 0; return q>shippingRule.threshold ? shippingRule.high : shippingRule.low; }

    // ==================== 用户管理 ====================
    async function renderUserList() {
        const tbody = document.querySelector('#userTable tbody'); tbody.innerHTML='';
        const s = await db.collection('users').get();
        s.forEach(d=>{
            const u=d.data(); tbody.innerHTML+=`<tr><td>${u.username}</td><td>${u.password}</td><td>${u.balance||0}</td><td>${u.role}</td>
            <td><button class="btn-danger" onclick="db.collection('users').doc('${d.id}').delete().then(()=>renderUserList())">删除</button>
            ${u.role==='sales'?`<button class="btn-success" onclick="adjustBalancePrompt('${d.id}','${u.username}','add')">+加款</button><button class="btn-warning" onclick="adjustBalancePrompt('${d.id}','${u.username}','deduct')">-扣款</button>`:''}</td></tr>`;
        });
    }
    window.adjustBalancePrompt = function(uid, username, type) {
        const amount = prompt(`请输入要${type==='add'?'增加':'减少'}的金额（${username}）：`);
        if(!amount||isNaN(parseFloat(amount))||parseFloat(amount)<=0) return;
        adjustBalance(uid, username, type==='add'?parseFloat(amount):-parseFloat(amount));
    };
    async function adjustBalance(uid, username, delta) {
        await ensureAuth();
        const userRef = db.collection('users').doc(uid);
        await db.runTransaction(async(t)=>{
            const userDoc = await t.get(userRef);
            const old = userDoc.data().balance||0, now = old+delta;
            t.update(userRef,{balance:now});
        });
        renderUserList();
    }
    document.getElementById('addUserBtn').addEventListener('click', async ()=>{
        const u=document.getElementById('newUsername').value.trim(), p=document.getElementById('newPassword').value.trim(), b=parseFloat(document.getElementById('newBalance').value)||0;
        if(!u||!p){alert('不能为空');return;}
        if(!(await db.collection('users').where('username','==',u).get()).empty){alert('已存在');return;}
        await db.collection('users').add({username:u,password:p,role:'sales',balance:b}); renderUserList();
    });

    // ==================== 销售商：上传订单 ====================
    function parseOrderRow(row) {
        let rowItemCost = 0, rowQty = 0;
        for(let i=0;i<5;i++) {
            const sku = String(row[14+i*2]||'').trim(), qty = parseInt(row[15+i*2])||0;
            if(sku && qty>0) {
                const prod = allProducts.find(p=>p.sku===sku);
                rowItemCost += (prod?prod.price:0) * qty;
                rowQty += qty;
            }
        }
        return { rowItemCost, rowQty };
    }

    document.getElementById('uploadOrderBtn').addEventListener('click', async ()=>{
        const file = document.getElementById('orderFile').files[0];
        if(!file) { alert('请选择文件'); return; }
        const reader = new FileReader();
        reader.onload = async (e) => {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, {header:1});
            if(rows.length < 2) { alert('文件无数据'); return; }
            if(rows[0] && (rows[0][0]==='填表日期' || rows[0][3]==='收件人姓名')) rows.shift();

            let totalItemCost = 0, totalQty = 0;
            for(const row of rows) {
                if(row.length < 4) continue;
                const { rowItemCost, rowQty } = parseOrderRow(row);
                totalItemCost += rowItemCost;
                totalQty += rowQty;
            }
            const shippingFee = calcShipping(totalQty);
            const totalCost = totalItemCost + shippingFee;

            const userDoc = await db.collection('users').doc(currentUser.id).get();
            const balance = userDoc.data().balance || 0;
            if(balance < totalCost) { document.getElementById('uploadMsg').textContent = `余额不足！需要 ${totalCost.toFixed(2)} 元，当前余额 ${balance.toFixed(2)} 元`; return; }

            const newBalance = balance - totalCost;
            await db.collection('users').doc(currentUser.id).update({balance: newBalance});
            currentUser.balance = newBalance;

            const fullData = [];
            for(const row of rows) {
                if(row.length < 4) continue;
                const { rowItemCost, rowQty } = parseOrderRow(row);
                const rowShipping = calcShipping(rowQty);
                const rowTotal = rowItemCost + rowShipping;
                const newRow = [...row.slice(0,24).concat(new Array(24-row.length).fill('')), rowItemCost.toFixed(2), rowShipping, rowTotal.toFixed(2), balance.toFixed(2), newBalance.toFixed(2), (newBalance-balance).toFixed(2), '', '否'];
                fullData.push(newRow);
            }

            await db.collection('orders').add({
                username: currentUser.username, userId: currentUser.id,
                totalItemCost, shippingFee, totalCost,
                balanceBefore: balance, balanceAfter: newBalance,
                data: fullData,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('uploadMsg').textContent = `上传成功！扣款 ${totalCost.toFixed(2)} 元，剩余余额 ${newBalance.toFixed(2)} 元`;
            document.getElementById('orderFile').value = '';
        };
        reader.readAsArrayBuffer(file);
    });

    // 下载模板
    document.getElementById('downloadTemplateBtn').addEventListener('click', ()=>{
        const ws = XLSX.utils.aoa_to_sheet([TEMPLATE_HEADERS.slice(0,24)]);
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, '模板');
        XLSX.writeFile(wb, '金海嘉运标准模板.xlsx');
    });

    // 销售商下载
    document.getElementById('downloadMyFileBtn').addEventListener('click', async ()=>{
        const snap = await db.collection('dist_files').where('username','==',currentUser.username).orderBy('timestamp','desc').limit(1).get();
        if(snap.empty) { document.getElementById('downloadMsg').textContent = '暂无管理员分发的表格'; return; }
        const doc = snap.docs[0].data();
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(doc.data), doc.sheetName || '表格');
        XLSX.writeFile(wb, `${currentUser.username}_最新表格.xlsx`);
        document.getElementById('downloadMsg').textContent = '下载成功';
    });

    // ==================== 管理员：上传总表拆分 ====================
    document.getElementById('uploadMasterBtn').addEventListener('click', async ()=>{
        const file = document.getElementById('masterFile').files[0];
        if(!file) { alert('请选择文件'); return; }
        const reader = new FileReader();
        reader.onload = async (e) => {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
            const salesSnap = await db.collection('users').where('role','==','sales').get();
            const salesNames = salesSnap.docs.map(d=>d.data().username);
            let count = 0;
            const batch = db.batch();
            for(const name of wb.SheetNames) {
                if(salesNames.includes(name)) {
                    const ws = wb.Sheets[name];
                    const data = XLSX.utils.sheet_to_json(ws, {header:1});
                    batch.set(db.collection('dist_files').doc(), {
                        username: name, sheetName: name, data: data,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    count++;
                }
            }
            await batch.commit();
            document.getElementById('masterMsg').textContent = `成功拆分并分发到 ${count} 个销售商`;
        };
        reader.readAsArrayBuffer(file);
    });

    // ==================== 管理员：下载订单 ====================
    document.getElementById('downloadAllOrdersBtn').addEventListener('click', async ()=>{
        const start = document.getElementById('adminStartDate').value, end = document.getElementById('adminEndDate').value;
        let q = db.collection('orders').orderBy('timestamp','desc');
        if(start) q = q.where('timestamp','>=',new Date(start));
        if(end) q = q.where('timestamp','<=',new Date(end+'T23:59:59'));
        const snap = await q.get();
        const groups = {};
        snap.forEach(d=>{
            const o = d.data();
            if(!groups[o.username]) groups[o.username] = [];
            if(o.data && Array.isArray(o.data)) groups[o.username].push(...o.data);
        });
        const wb = XLSX.utils.book_new();
        for(const [name, data] of Object.entries(groups)) {
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([TEMPLATE_HEADERS, ...data]), name);
        }
        if(Object.keys(groups).length === 0) { alert('没有订单数据'); return; }
        XLSX.writeFile(wb, `全部订单_${start||'全部'}_${end||'全部'}.xlsx`);
    });

    // ==================== 月度汇总 ====================
    document.getElementById('generateSummaryBtn').addEventListener('click', async ()=>{
        const month = document.getElementById('summaryMonth').value;
        if(!month) { alert('请选择月份'); return; }
        const [year, mon] = month.split('-');
        const start = new Date(year, mon-1, 1);
        const end = new Date(year, mon, 0, 23, 59, 59);
        const snap = await db.collection('orders').where('timestamp','>=',start).where('timestamp','<=',end).get();
        const dayMap = {}, allSkus = new Set(), allSales = new Set();
        snap.forEach(d=>{
            const o = d.data();
            const day = new Date(o.timestamp.toDate()).getDate();
            if(!dayMap[day]) dayMap[day] = {};
            allSales.add(o.username);
            if(!o.data) return;
            for(const row of o.data) {
                for(let i=0;i<5;i++) {
                    const sku = String(row[14+i*2]||'').trim(), qty = parseInt(row[15+i*2])||0;
                    if(sku && qty>0) {
                        allSkus.add(sku);
                        if(!dayMap[day][sku]) dayMap[day][sku] = {};
                        dayMap[day][sku][o.username] = (dayMap[day][sku][o.username]||0) + qty;
                    }
                }
            }
        });
        if(allSkus.size === 0) { alert('该月没有订单数据'); return; }
        const salesArr = [...allSales].sort();
        const skuArr = [...allSkus].sort();
        const days = Object.keys(dayMap).map(Number).sort((a,b)=>a-b);
        const header = ['SKU'];
        for(const d of days) {
            for(const s of salesArr) header.push(`${mon}月${d}日 ${s}`);
            header.push(`${mon}月${d}日 合计`);
        }
        const dataRows = [header];
        for(const sku of skuArr) {
            const row = [sku];
            for(const d of days) {
                let dayTotal = 0;
                for(const s of salesArr) {
                    const qty = (dayMap[d]?.[sku]?.[s]) || 0;
                    row.push(qty || '');
                    dayTotal += qty;
                }
                row.push(dayTotal || '');
            }
            dataRows.push(row);
        }
        const ws = XLSX.utils.aoa_to_sheet(dataRows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, `${year}年${mon}月`);
        XLSX.writeFile(wb, `月度汇总_${year}年${mon}月.xlsx`);
        document.getElementById('summaryMsg').textContent = `已生成 ${year}年${mon}月 汇总表`;
    });

    // 初始化
    async function initAdminUser() {
        await ensureAuth();
        if((await db.collection('users').where('username','==',ADMIN_USER).get()).empty)
            await db.collection('users').add({username:ADMIN_USER,password:ADMIN_PASS,role:'admin',balance:0});
    }
    initAdminUser();
</script>
</body>
</html>
